apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nodejs-cicd-app-ingress
  namespace: dev
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/tags: "env=dev,project=nodejs-cicd"
spec:
  rules:
    - host: dev.nodejs-app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nodejs-cicd-app-svc
                port:
                  number: 80
