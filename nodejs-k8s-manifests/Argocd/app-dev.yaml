apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nodejs-cicd-app-dev
  namespace: argocd
  labels:
    project: nodejs-cicd
    env: dev
  # Auto-delete resources when this Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nodejs-cicd

  source:
    repoURL: https://github.com/YOUR_USERNAME/nodejs-k8s-manifests.git
    targetRevision: HEAD
    path: dev

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true        # Remove resources deleted from Git
      selfHeal: true     # Revert manual cluster changes
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health check customization
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas   # Ignore HPA-managed replica count
