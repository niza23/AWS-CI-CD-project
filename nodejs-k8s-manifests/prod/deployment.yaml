apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-cicd-app
  namespace: prod
  labels:
    app: nodejs-cicd-app
    env: prod
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nodejs-cicd-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nodejs-cicd-app
        env: prod
    spec:
      serviceAccountName: nodejs-cicd-app-sa
      containers:
        - name: nodejs-cicd-app
          # Jenkins updates this image tag on prod promotion
          image: 123456789.dkr.ecr.ap-south-1.amazonaws.com/nodejs-cicd-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: nodejs-cicd-app
